name: Release Container

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true

      - name: Build signed agent binaries
        env:
          RELEASE_PUBLIC_KEY: ${{ secrets.THISM_RELEASE_PUBLIC_KEY }}
          THISM_RELEASE_PRIVATE_KEY: ${{ secrets.THISM_RELEASE_PRIVATE_KEY }}
        run: |
          if [ -z "${RELEASE_PUBLIC_KEY}" ] || [ -z "${THISM_RELEASE_PRIVATE_KEY}" ]; then
            echo "::error::THISM_RELEASE_PUBLIC_KEY and THISM_RELEASE_PRIVATE_KEY repository secrets are required for signed releases"
            exit 1
          fi
          make build-sign-tool
          RELEASE_PUBLIC_KEY="${RELEASE_PUBLIC_KEY}" make build-agent-all
          ./bin/thism-sign sign-dist -dir dist

      - name: Verify signed dist
        run: |
          test -f dist/thism-agent-linux-amd64
          test -f dist/thism-agent-linux-arm64
          test -f dist/thism-agent-linux-amd64.sig
          test -f dist/thism-agent-linux-arm64.sig
          ls -la dist/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME}"
          SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY}"

          {
            echo "version=${VERSION}"
            echo "short_sha=${SHORT_SHA}"
            echo "build_time=${BUILD_TIME}"
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            echo "${IMAGE}:sha-${SHORT_SHA}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            THISM_VERSION=${{ steps.meta.outputs.version }}
            THISM_COMMIT=${{ github.sha }}
            THISM_BUILD_TIME=${{ steps.meta.outputs.build_time }}
            PREBUILT_AGENTS=1

      - name: Attach signed agents to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/thism-agent-linux-amd64
            dist/thism-agent-linux-arm64
            dist/thism-agent-linux-amd64.sig
            dist/thism-agent-linux-arm64.sig
            dist/thism-agent-linux-amd64.version
            dist/thism-agent-linux-arm64.version

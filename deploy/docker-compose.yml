services:
  thism-server:
    image: ${THISM_IMAGE:-ghcr.io/thism-dev/thism:latest}
    container_name: thism-server
    ports:
      - "${THISM_PORT:-8080}:8080"
    volumes:
      - thism-data:/data
    command:
      - --port
      - "8080"
      - --db
      - /data/thism.db
      - --token
      - ${THISM_TOKEN:?set THISM_TOKEN in .env}
      - --admin-user
      - ${THISM_ADMIN_USER:?set THISM_ADMIN_USER in .env}
      - --admin-pass
      - ${THISM_ADMIN_PASS:?set THISM_ADMIN_PASS in .env}
    restart: unless-stopped

volumes:
  thism-data:
